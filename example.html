<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karpathy AI Knowledge Graph</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f6f3;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: #37352f;
            height: 100vh;
            width: 100vw;
        }

        #graph-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .graph-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            font-weight: normal;
            color: #37352f;
            opacity: 0.85;
            z-index: 100;
            pointer-events: none;
        }

        .graph-tip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: #6b7280;
            opacity: 0.7;
            z-index: 100;
            pointer-events: none;
        }

        svg {
            user-select: none;
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
<div id="graph-container">
    <div class="graph-title">Karpathy AI Knowledge Graph</div>
    <div class="graph-tip">Drag nodes | Zoom wheel | Double click focus</div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var graphData = {
            nodes: [
                { id: "root", name: "AI Knowledge Base", group: 0, size: 28 },
                { id: "raw", name: "Raw Materials", group: 1, size: 18 },
                { id: "paper", name: "Papers", group: 1, size: 10 },
                { id: "article", name: "Articles", group: 1, size: 10 },
                { id: "note", name: "Notes Images", group: 1, size: 10 },
                { id: "wiki", name: "Wiki Network", group: 2, size: 18 },
                { id: "markdown", name: "Markdown", group: 2, size: 10 },
                { id: "graph", name: "Concept Graph", group: 2, size: 10 },
                { id: "relation", name: "Knowledge Links", group: 2, size: 10 },
                { id: "rule", name: "Rule Book", group: 3, size: 18 },
                { id: "cloud", name: "cloud.md", group: 3, size: 10 },
                { id: "work", name: "AI Rules", group: 3, size: 10 },
                { id: "naming", name: "Naming Rule", group: 3, size: 10 }
            ],
            links: [
                { source: "root", target: "raw", value: 1 },
                { source: "raw", target: "paper", value: 0.5 },
                { source: "raw", target: "article", value: 0.5 },
                { source: "raw", target: "note", value: 0.5 },
                { source: "root", target: "wiki", value: 1 },
                { source: "wiki", target: "markdown", value: 0.5 },
                { source: "wiki", target: "graph", value: 0.5 },
                { source: "wiki", target: "relation", value: 0.5 },
                { source: "root", target: "rule", value: 1 },
                { source: "rule", target: "cloud", value: 0.5 },
                { source: "rule", target: "work", value: 0.5 },
                { source: "rule", target: "naming", value: 0.5 }
            ]
        };

        var width = window.innerWidth;
        var height = window.innerHeight;

        var svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        var zoom = d3.zoom()
            .scaleExtent([0.2, 2.5])
            .on("zoom", function(event) {
                g.attr("transform", event.transform);
            });
        svg.call(zoom);

        var g = svg.append("g");

        var simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(function(d) { return d.id; }).distance(90).strength(0.7))
            .force("charge", d3.forceManyBody().strength(-280))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(function(d) { return d.size + 8; }).iterations(4));

        var link = g.append("g")
            .selectAll("line")
            .data(graphData.links)
            .enter().append("line")
            .attr("stroke", "#9ca3af")
            .attr("stroke-opacity", 0.45)
            .attr("stroke-width", function(d) { return d.value === 1 ? 1 : 0.8; })
            .attr("stroke-linecap", "round");

        var node = g.append("g")
            .selectAll(".node")
            .data(graphData.nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.append("circle")
            .attr("r", function(d) { return d.size / 2; })
            .attr("fill", "transparent")
            .attr("stroke", "#37352f")
            .attr("stroke-width", 1)
            .attr("stroke-opacity", 0.9);

        node.append("circle")
            .attr("r", function(d) { return (d.size / 2) - 1; })
            .attr("fill", "#ffffff")
            .attr("stroke", "none")
            .attr("opacity", 0.95);

        node.append("circle")
            .attr("r", function(d) { return d.size / 4.5; })
            .attr("fill", "#37352f")
            .attr("stroke", "none")
            .attr("opacity", 0.98);

        node.append("text")
            .attr("dx", function(d) { return d.size / 2 + 6; })
            .attr("dy", ".32em")
            .text(function(d) { return d.name; })
            .style("font-size", "11px")
            .style("font-weight", "normal")
            .style("fill", "#37352f")
            .style("opacity", 0.9)
            .style("pointer-events", "none");

        simulation.on("tick", function() {
            link
                .attr("x1", function(d) { return d.source.x; })
                .attr("y1", function(d) { return d.source.y; })
                .attr("x2", function(d) { return d.target.x; })
                .attr("y2", function(d) { return d.target.y; });

            node
                .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
        });

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.2).restart();
            d.fx = d.x;
            d.fy = d.y;
            d3.select(event.currentTarget).selectAll("circle").attr("opacity", 1);
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
            d3.select(event.currentTarget).selectAll("circle").attr("opacity", 0.95);
        }

        node.on("dblclick", function(event, d) {
            svg.transition()
                .duration(300)
                .ease(d3.easeCubicInOut)
                .call(zoom.transform, d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(1.8)
                    .translate(-d.x, -d.y));
        });

        node.on("mouseover", function() {
            d3.select(this).selectAll("circle")
                .attr("opacity", 1)
                .attr("stroke-width", 1.2);
            d3.select(this).select("text").attr("opacity", 1);
        }).on("mouseout", function() {
            d3.select(this).selectAll("circle")
                .attr("opacity", 0.95)
                .attr("stroke-width", 1);
            d3.select(this).select("text").attr("opacity", 0.9);
        });

        window.addEventListener('resize', function() {
            var newWidth = window.innerWidth;
            var newHeight = window.innerHeight;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2)).restart();
        });
    });
</script>
</body>
</html>
